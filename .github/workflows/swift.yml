name: Swift

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: swift --version
      - name: Resolve dependencies
        run: swift package resolve
      - name: Build
        run: swift build
      - name: Test
        run: swift test
